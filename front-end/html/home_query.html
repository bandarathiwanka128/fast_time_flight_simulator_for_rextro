<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- bootstrap css -->
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <!-- site css -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <!-- font awesome -->
  <link rel="stylesheet" href="css/font-awesome.min.css">

  <title>Home</title>

  <style>
    .head-top {
      padding-bottom: 100px;
      margin-bottom: 50px;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .login-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image: url("images/body_bg.jpg");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
    }

    .login-box {
      margin-top: 100px;
      margin-bottom: 100px;
      width: 50%;
      padding: 40px 30px;
      background-color: rgba(255, 255, 255, 0.40);
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(3px);
    }

    .login-title {
      font-size: 28px;
      text-align: center;
      margin-bottom: 30px;
      color: black;
      font-weight: bold;
    }

    .form-group label {
      font-weight: bold;
    }

    .openbtn img {
      width: 40px;
    }

    .sidepanel {
      height: 100%;
      width: 0;
      position: fixed;
      z-index: 9999;
      top: 0;
      right: 0;
      background-color: #111;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
    }

    .sidepanel a {
      padding: 10px 20px;
      text-decoration: none;
      color: white;
      display: block;
      transition: 0.2s;
    }

    .sidepanel a:hover {
      background-color: #575757;
    }

    .closebtn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 36px;
    }
  </style>
</head>

<body>

<!-- Side Navigation -->
<div id="mySidepanel" class="sidepanel">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
  <a class="active" href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="searvices.html">Searvices</a>
</div>

<header>
  <div class="head-top">
    <div class="container-fluid">
      <div class="row d_flex">
        <div class="col-sm-3">
          <div class="logo">
            <a href="index.html">Sky-Navigator</a>
          </div>
        </div>

        <div class="col-sm-5">
          <ul class="social_icon text_align_right d_none">
            <li> <a href="#"><i class="fa fa-facebook-f"></i></a></li>
            <li> <a href="#"><i class="fa fa-twitter"></i></a></li>
            <li> <a href="#"><i class="fa fa-linkedin"></i></a></li>
            <li> <a href="#"><i class="fa fa-instagram"></i></a></li>
            <li> <a href="#"><i class="fa fa-youtube-play"></i></a></li>
          </ul>
        </div>

        <div class="col-sm-4">
          <ul class="email text_align_right">
            <li>
              <button class="openbtn" onclick="openNav()">
                <img src="images/menu_btn.png">
              </button>
            </li>
          </ul>
        </div>

      </div>
    </div>
  </div>
</header>

<div class="login-background"></div>

<!-- Upload Card -->
<div class="login-box">
  <h2 class="login-title">File Upload</h2>

  <form id="upload-form" enctype="multipart/form-data">
    <div class="form-group">
      <label>Upload Planes CSV:</label>
      <input type="file" name="planes" accept=".csv">
    </div>

    <div class="form-group">
      <label>Upload Routes CSV:</label>
      <input type="file" name="routes" accept=".csv">
    </div>

    <div class="form-group">
      <label>Upload Waypoints CSV:</label>
      <input type="file" name="waypoints" accept=".csv">
    </div>

    <div class="form-group">
      <label>Upload Altitude Levels CSV:</label>
      <input type="file" name="altitudes" accept=".csv">
    </div>

    <button type="submit" class="btn btn-primary btn-block">Upload</button>
  </form>

  <div id="error-message" class="text-center mt-3"></div>
</div>

<script src="../js/config.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
  function openNav() {
    document.getElementById("mySidepanel").style.width = "250px";
  }

  function closeNav() {
    document.getElementById("mySidepanel").style.width = "0";
  }

  $(document).ready(function () {
    $('#upload-form').submit(function (e) {
      e.preventDefault();

      const formData = new FormData(this);
      const urlParams = new URLSearchParams(window.location.search);
      const username = urlParams.get('username');

      $.ajax({
        type: 'POST',
        url: BASE_URL + `/grp11/backend/upload?username=${username}`,
        data: formData,
        contentType: false,
        processData: false,
        success: function (response) {
          $('#error-message').html(
            '<div class="alert alert-success">Upload Successful</div>'
          );

          window.location.href = `themap.html?username=${username}`;
        },
        error: function () {
          $('#error-message').html(
            '<div class="alert alert-danger">Upload Failed</div>'
          );
        }
      });
    });
  });
</script>

</body>
</html>
