<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="keywords" content="">
    <meta name="description" content="">
    <meta name="author" content="">

    <!-- bootstrap css -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- style css -->
    <link rel="stylesheet" href="css/style.css">
    <!-- responsive -->
    <link rel="stylesheet" href="css/responsive.css">
    <!-- awesome fontfamily -->
    <link rel="stylesheet" href="css/font-awesome.min.css">

    <title>Login</title>

    <style>
        form{
            height: 520px;
            width: 400px;
            background-color: rgba(255,255,255,0.13);
            position: absolute;
            transform: translate(-50%,-50%);
            top: 50%;
            left: 50%;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(8,7,16,0.6);
            padding: 50px 35px;
        }
        .head-top {
            margin-top: 0px;
            padding-bottom: 100px;
            margin-bottom: 50px;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        form *{
            font-family: 'Poppins',sans-serif;
            color: #030303;
            letter-spacing: 0.5px;
            outline: none;
            border: none;
        }
        form h3{
            font-size: 32px;
            font-weight: 500;
            line-height: 42px;
            text-align: center;
        }

        label{
            display: block;
            margin-top: 30px;
            font-size: 16px;
            font-weight: 500;
        }
        input{
            display: block;
            height: 50px;
            width: 100%;
            background-color: rgba(255,255,255,0.07);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
        }
        ::placeholder{
            color: #474747;
        }
        button{
            margin-top: 30px;
            width: 100%;
            background-color: #ffffff;
            color: #080710;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg {
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .msg.success { background: rgba(40,167,69,0.25); border: 1px solid #28a745; color: #90ee90; display: block; }
        .msg.error   { background: rgba(220,53,69,0.25);  border: 1px solid #dc3545; color: #ff8080; display: block; }

        .login-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url("images/airplane_wing_sky_111276_1680x1050.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 1;
        }
    </style>
</head>

<body>

    <header>
        <div class="head-top">
            <div class="container-fluid">
                <div class="row d_flex">
                    <div class="col-sm-3">
                        <div class="logo">
                            <a href="index.html">Sky-Navigator</a>
                        </div>
                    </div>
                    <div class="col-sm-5">
                        <ul class="social_icon text_align_right d_none">
                            <li><a href="#"><i class="fa fa-facebook-f"></i></a></li>
                            <li><a href="#"><i class="fa fa-twitter"></i></a></li>
                            <li><a href="#"><i class="fa fa-linkedin"></i></a></li>
                            <li><a href="#"><i class="fa fa-instagram"></i></a></li>
                            <li><a href="#"><i class="fa fa-youtube-play"></i></a></li>
                        </ul>
                    </div>

                    <div class="col-sm-4">
                        <ul class="email text_align_right"></ul>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="login-background"></div>

    <form>
        <h3>Login Here</h3>

        <label for="username">Username</label>
        <input type="text" placeholder="Email or Phone" id="username">

        <label for="password">Password</label>
        <input type="password" placeholder="Password" id="password">

        <button id="loginBtn" onclick="checkUsername()">Log In</button>
        <div id="loginMsg" class="msg"></div>
        <a href="signup.html" style="display:block;text-align:center;margin-top:14px;color:#ccc;font-size:14px;">Create Account</a>
    </form>

    <!-- Load config.js FIRST -->
    <script src="js/config.js"></script>

    <!-- Basic external libs -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- LOGIN SCRIPT -->
    <script>
        function showMsg(text, type) {
            const el = document.getElementById('loginMsg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        function checkUsername() {
            event.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const btn = document.getElementById("loginBtn");

            if (!username || !password) {
                showMsg('Please enter username and password.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Logging in...';

            fetch(BASE_URL + `/grp11/backend/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMsg('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = `home.html?username=${encodeURIComponent(username)}`;
                    }, 800);
                } else {
                    showMsg('Invalid username or password.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Log In';
                }
            })
            .catch(error => {
                showMsg('Connection error. Is the server running?', 'error');
                btn.disabled = false;
                btn.textContent = 'Log In';
            });
        }
    </script>

</body>
</html>
