<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- MUST BE FIRST -->
    <script src="js/config.js"></script>

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/font-awesome.min.css">

    <title>Sign Up</title>

    <style>
        form {
            height: 550px;
            width: 400px;
            background-color: rgba(255,255,255,0.13);
            position: absolute;
            transform: translate(-50%,-50%);
            top: 50%;
            left: 50%;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(8,7,16,0.6);
            padding: 50px 35px;
        }
        .head-top {
            padding-bottom: 100px;
            margin-bottom: 50px;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        form * {
            font-family: 'Poppins', sans-serif;
            color: #030303;
            letter-spacing: 0.5px;
        }
        form h3 {
            font-size: 32px;
            font-weight: 500;
            text-align: center;
        }
        label {
            display: block;
            margin-top: 30px;
            font-size: 16px;
            font-weight: 500;
        }
        input {
            display: block;
            height: 50px;
            width: 100%;
            background-color: rgba(255,255,255,0.07);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            background-color: #ffffff;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .msg.success { background: rgba(40,167,69,0.25); border: 1px solid #28a745; color: #90ee90; display: block; }
        .msg.error   { background: rgba(220,53,69,0.25);  border: 1px solid #dc3545; color: #ff8080; display: block; }
        .login-background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("images/body_bg.jpg");
            background-size: cover;
        }
    </style>
</head>

<body>

    <div class="login-background"></div>

    <form onsubmit="validateForm(event)">
        <h3>Sign Up Here</h3>

        <label for="username">Username</label>
        <input type="text" placeholder="Email or Phone" id="username" required>

        <label for="password">Password</label>
        <input type="password" placeholder="Password" id="password" required>

        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>

        <button type="submit" id="signupBtn">Sign Up</button>
        <div id="signupMsg" class="msg"></div>
        <a href="login.html" style="display:block;text-align:center;margin-top:12px;color:#ccc;font-size:14px;">Already have an account? Log In</a>
    </form>

    <!-- Local JS -->
    <script src="js/jquery.min.js"></script>

    <script>
        function showMsg(text, type) {
            const el = document.getElementById('signupMsg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        function validateForm(event) {
            event.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const btn = document.getElementById("signupBtn");

            if (!username || !password) {
                showMsg('Please fill in all fields.', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showMsg('Passwords do not match.', 'error');
                return;
            }
            if (password.length < 4) {
                showMsg('Password must be at least 4 characters.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            fetch(BASE_URL + "/grp11/backend/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showMsg('Account created! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = `login.html`;
                    }, 1200);
                } else if (data.error === 'user exists') {
                    showMsg('Username already taken. Try another.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Sign Up';
                } else {
                    showMsg('Signup failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Sign Up';
                }
            })
            .catch(err => {
                showMsg('Connection error. Is the server running?', 'error');
                btn.disabled = false;
                btn.textContent = 'Sign Up';
            });
        }
    </script>

</body>
</html>
